<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>{{ app }} Login</title>
    <style>
      body { font-family: Arial, sans-serif; padding: 30px; max-width: 720px; margin: auto; }
      .card { border: 1px solid #ddd; border-radius: 12px; padding: 18px; }
      .muted { color: #666; font-size: 14px; }
      input { width: 100%; padding: 10px; margin: 8px 0; }
      button { padding: 10px 14px; }
    </style>
  </head>
  <body>
    <h2>{{ app }}</h2>
    <p class="muted">Doctor access (example). Partner preview is invite-only and not shown here.</p>

    <div class="card">
      <label>Email</label>
      <input placeholder="doctor@clinic.com" />
      <label>Password</label>
      <input type="password" placeholder="••••••••" />
      <button disabled>Login (wire to your auth)</button>
      <p class="muted">Tip: implement your real authentication here.</p>
    </div>
  </body>
</html>
